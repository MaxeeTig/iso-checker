scenarios:
  - name: preauth_completion
    description: >
      POS pre-authorization (DE3 180000, SVFE type 736) then completion (DE3 900000, type 737).
      Second step must match PAN and RRN from the first; Field 90 is required on completion per spec.
    steps:
      - id: preauth
        expect_mti: "1100"
        validate:
          field48_check_de3: true
          expect_field_values:
            "3": "180000"
        respond:
          mti: "1110"
          field_overrides:
            "39": "000"
        reference_request:
          t: "1100"
          "2": "4111111111111111"
          "3": "180000"
          "4": "000000001000"
          "12": "250403120000"
          "14": "2512"
          "15": "250403"
          "18": "5999"
          "22": "510101510301"
          "32": "123456"
          "37": "RRN100000001"
          "41": "TERM0001"
          "42": "MERCHANT00001"
          "43": "ShopX                   CITY    PL"
          "48": "009002003736"
          "49": "978"
      - id: completion
        expect_mti: "1100"
        validate:
          matches_step: preauth
          field48_check_de3: true
          expect_field_values:
            "3": "900000"
          required_fields:
            - "90"
        respond:
          mti: "1110"
          field_overrides:
            "39": "000"
        reference_request:
          inherit_request_from: preauth
          field_overrides:
            "3": "900000"
            "48": "009002003737"
            "90": "010000000000000000000000000000000"
          copy_response_fields:
            "37": "37"

