scenarios:
  - name: auth_reversal
    description: Authorization 1100 then reversal 1420; RRN and PAN must match first step.
    steps:
      - id: auth
        expect_mti: "1100"
        validate:
          field48_check_de3: true
        respond:
          mti: "1110"
          field_overrides:
            "39": "000"
        reference_request:
          t: "1100"
          "2": "4111111111111111"
          "3": "000000"
          "4": "000000001000"
          "12": "250403120000"
          "14": "2512"
          "15": "250403"
          "18": "5999"
          "22": "510101510301"
          "32": "123456"
          "37": "RRN100000001"
          "41": "TERM0001"
          "42": "MERCHANT00001"
          "43": "ShopX                   CITY    PL"
          "48": "009002003774"
          "49": "978"
      - id: reversal
        expect_mti: "1420"
        validate:
          matches_step: auth
        respond:
          mti: "1430"
          field_overrides:
            "39": "000"
        reference_request:
          inherit_request_from: auth
          field_overrides:
            t: "1420"
            "39": "000"
          copy_response_fields:
            "37": "37"

