scenarios:
  - name: auth_reversal
    description: Authorization 1100 then reversal 1420; RRN and PAN must match first step.
    steps:
      - id: auth
        expect_mti: "1100"
        validate:
          field48_check_de3: true
        respond:
          mti: "1110"
          field_overrides:
            "39": "000"
      - id: reversal
        expect_mti: "1420"
        validate:
          matches_step: auth
        respond:
          mti: "1430"
          field_overrides:
            "39": "000"


