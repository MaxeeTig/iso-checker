scenarios:
  - name: purchase_refund
    description: >
      Approved purchase authorization then a return/refund request (transaction code 20 in DE3).
      Field 48 tag 002 should be 775 (POS Return or Refund) or 681 (E-POS) per deployment; refund
      matching uses Field 90 — scenario only requires DE3 prefix and presence of 90.
    steps:
      - id: purchase
        expect_mti: "1100"
        validate:
          field48_check_de3: true
        respond:
          mti: "1110"
          field_overrides:
            "39": "000"
        reference_request:
          t: "1100"
          "2": "4111111111111111"
          "3": "000000"
          "4": "000000001000"
          "12": "250403120000"
          "14": "2512"
          "15": "250403"
          "18": "5999"
          "22": "510101510301"
          "32": "123456"
          "37": "RRN100000001"
          "41": "TERM0001"
          "42": "MERCHANT00001"
          "43": "ShopX                   CITY    PL"
          "48": "009002003774"
          "49": "978"
      - id: refund
        expect_mti: "1100"
        validate:
          expect_field_values:
            "3": "200000"
          required_fields:
            - "90"
        respond:
          mti: "1110"
          field_overrides:
            "39": "000"
        reference_request:
          inherit_request_from: purchase
          field_overrides:
            "3": "200000"
            "48": "009002003775"
            "90": "010000000000000000000000000000000"
          copy_response_fields:
            "37": "37"

